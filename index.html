<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MG Agents"/>
  <meta name="theme-color" content="#085041"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Madinah Guide — Call Center</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#085041;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .wrap{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:1.25rem}
    .logo{font-size:52px;margin-bottom:0.25rem}
    .title{font-size:20px;font-weight:700;color:#fff;text-align:center}
    .sub{font-size:13px;color:#9FE1CB;text-align:center}
    .divider{width:40px;height:2px;background:rgba(255,255,255,0.15);border-radius:2px}
    .card{width:100%;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:18px;padding:1.25rem;text-align:center;cursor:pointer;text-decoration:none;display:block;transition:all 0.2s}
    .card:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.4)}
    .card:active{transform:scale(0.97)}
    .card-icon{font-size:32px;margin-bottom:0.5rem}
    .card-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:4px}
    .card-sub{font-size:12px;color:#9FE1CB;line-height:1.4}
    .card.agent{background:rgba(29,158,117,0.3);border-color:rgba(29,158,117,0.5)}
    .card.agent:hover{background:rgba(29,158,117,0.45)}
    .footer{font-size:11px;color:rgba(255,255,255,0.3);text-align:center}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">🕌</div>
  <div class="title">Madinah Guide</div>
  <div class="sub">Call Center Portal · بوابة مركز الاتصال</div>
  <div class="divider"></div>

  <a class="card agent" href="agent-login.html">
    <div class="card-icon">🎧</div>
    <div class="card-title">I am an agent</div>
    <div class="card-sub">Login to take visitor calls · تسجيل دخول للرد على المكالمات</div>
  </a>

  <a class="card" href="manager.html">
    <div class="card-icon">📊</div>
    <div class="card-title">I am a manager</div>
    <div class="card-sub">Dashboard — agents, call logs, analytics · لوحة التحكم الإدارية</div>
  </a>

  <div class="footer">Madinah Guide Call Center · Staff only · للموظفين فقط</div>
</div>

<script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
</script>
</body>
</html>
